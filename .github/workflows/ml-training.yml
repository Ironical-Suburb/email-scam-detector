name: ML Training Pipeline

on:
  workflow_dispatch:
    inputs:
      skip_data_collection:
        description: "Skip data collection (use existing data/processed/)"
        type: boolean
        default: false
      categories:
        description: "Comma-separated scam categories to target (empty = all)"
        type: string
        default: ""

# Training is expensive — only allow one run at a time
concurrency:
  group: ml-training
  cancel-in-progress: false

jobs:
  collect-data:
    name: Collect & label training data
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip_data_collection }}
    outputs:
      dataset_artifact: ${{ steps.upload.outputs.artifact-id }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-training-${{ hashFiles('backend/requirements.txt') }}

      - name: Install dependencies
        run: pip install requests pandas tqdm

      - name: Fetch PhishTank data
        env:
          PHISHTANK_API_KEY: ${{ secrets.PHISHTANK_API_KEY }}
        run: python scripts/data_collection/phishtank_fetch.py

      - name: Load Enron corpus
        run: python scripts/data_collection/enron_loader.py

      - name: Prepare & label dataset
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/data_collection/prepare_dataset.py

      - name: Upload processed dataset
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: training-dataset-${{ github.run_id }}
          path: data/processed/
          retention-days: 30

  train-classifier:
    name: Fine-tune DistilBERT classifier
    runs-on: ubuntu-latest
    needs: [collect-data]
    if: always() && !failure()

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-ml-${{ hashFiles('backend/requirements.txt') }}

      - name: Install ML dependencies
        run: pip install torch transformers sentence-transformers pandas scikit-learn

      - name: Restore dataset (if collected this run)
        if: ${{ !inputs.skip_data_collection }}
        uses: actions/download-artifact@v4
        with:
          name: training-dataset-${{ github.run_id }}
          path: data/processed/

      - name: Train DistilBERT classifier
        run: python scripts/training/train_classifier.py

      - name: Upload classifier model
        uses: actions/upload-artifact@v4
        with:
          name: classifier-model-${{ github.run_id }}
          path: models/classifier/
          retention-days: 90

  build-vector-store:
    name: Build ChromaDB vector store (SBERT)
    runs-on: ubuntu-latest
    needs: [collect-data]
    if: always() && !failure()

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install sentence-transformers chromadb pandas

      - name: Restore dataset (if collected this run)
        if: ${{ !inputs.skip_data_collection }}
        uses: actions/download-artifact@v4
        with:
          name: training-dataset-${{ github.run_id }}
          path: data/processed/

      - name: Build vector store
        run: python scripts/training/build_vector_store.py

      - name: Upload vector store
        uses: actions/upload-artifact@v4
        with:
          name: vector-store-${{ github.run_id }}
          path: data/chroma/
          retention-days: 90

  summarize:
    name: Training summary
    runs-on: ubuntu-latest
    needs: [train-classifier, build-vector-store]
    if: always()

    steps:
      - name: Report results
        run: |
          echo "### ML Training Pipeline Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Classifier training | ${{ needs.train-classifier.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Vector store build  | ${{ needs.build-vector-store.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Artifacts retained for 90 days. Download and upload to your model storage before deploying." >> $GITHUB_STEP_SUMMARY
