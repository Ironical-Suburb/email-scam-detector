name: Backend CI

on:
  push:
    branches: [main, develop]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  lint-and-test:
    name: Lint & Test (Python 3.12)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: scam_detector_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://user:password@localhost:5432/scam_detector_test
      # Stub secrets so config validation passes without real keys
      GOOGLE_SAFE_BROWSING_API_KEY: "stub"
      OPENAI_API_KEY: "stub"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt ruff pytest pytest-asyncio httpx

      - name: Lint with ruff
        working-directory: backend
        run: ruff check .

      - name: Check formatting with ruff
        working-directory: backend
        run: ruff format --check .

      - name: Run tests
        working-directory: backend
        run: |
          if [ -d tests ]; then
            pytest tests/ -v --tb=short
          else
            echo "No tests directory yet — skipping"
          fi
