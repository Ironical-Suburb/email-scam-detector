name: Feature Request
description: Suggest an improvement or new capability
labels: ["enhancement"]
body:
  - type: dropdown
    id: phase
    attributes:
      label: Phase
      options:
        - Phase 1 – Training pipeline
        - Phase 2 – Live detection
        - Infrastructure / DevOps
        - Mobile UI
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      placeholder: "Example: False positives on bank emails bloat the retraining queue..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
