name: Bug Report
description: Something isn't working correctly
labels: ["bug"]
body:
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Backend / API
        - ML – Classifier
        - ML – Vector similarity
        - ML – Risk scorer
        - Email parser
        - Gmail / IMAP connection
        - Mobile UI
        - Training pipeline
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe the bug clearly.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Send email with body '...'
        2. Call POST /api/v1/detect
        3. See error
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or output
      render: shell
